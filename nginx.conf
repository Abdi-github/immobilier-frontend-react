# =============================================
# NGINX Configuration - Immobilier Frontend
# Production configuration for React SPA
# =============================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # =============================================
    # Gzip Compression
    # =============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # =============================================
    # Security Headers
    # =============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # =============================================
    # SPA Routing - All routes to index.html
    # =============================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =============================================
    # Static Assets - Long-term caching
    # =============================================
    # JS and CSS with hash in filename (immutable)
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images and fonts
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # =============================================
    # API Proxy (optional - for same-origin requests)
    # =============================================
    location /api/ {
        proxy_pass http://immobilier_api_prod:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =============================================
    # Error Pages
    # =============================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # =============================================
    # Deny access to hidden files
    # =============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
